<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      // 预渲染主题脚本: 首屏前设置 html.dark, 避免亮暗闪烁 (FOUC)。
      // 默认暗色; 用户切过亮色后 (localStorage tf-theme=light) 保持亮色。
      (function () {
        try {
          if (localStorage.getItem('tf-theme') !== 'light') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
